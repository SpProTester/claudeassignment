##############################################################################
# STALE ISSUE & PR MANAGEMENT — Job Portal Enterprise
# Keeps the issue tracker clean by automatically marking stale items.
# Runs daily at 02:00 UTC.
##############################################################################

name: Stale

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  stale:
    name: Mark Stale Issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ----------------------------------------------------------------
          # STALE ISSUES
          # ----------------------------------------------------------------
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 This issue has been automatically marked as **stale** because it has had no activity for 30 days.

            If this issue is still relevant, please:
            - Add a comment with an update or additional context
            - Remove the `stale` label
            - Reference this in an active PR

            This issue will be automatically **closed in 7 days** if there is no further activity.

            Thank you for contributing to Job Portal! 🚀
          close-issue-message: |
            🔒 This issue was automatically closed because it had no activity for 37 days.

            If you believe this is still a valid issue, please reopen it with additional context.
          exempt-issue-labels: 'pinned,security,critical,bug,in-progress,needs-review,roadmap'

          # ----------------------------------------------------------------
          # STALE PULL REQUESTS
          # ----------------------------------------------------------------
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 This pull request has been automatically marked as **stale** because it has had no activity for 14 days.

            If this PR is still being worked on, please:
            - Add a comment or push new commits to reset the stale timer
            - Remove the `stale` label
            - Request a review if it's ready

            This PR will be automatically **closed in 7 days** if there is no further activity.
          close-pr-message: |
            🔒 This pull request was automatically closed due to inactivity.

            If this work is still needed, please reopen the PR or create a new one.
          exempt-pr-labels: 'pinned,security,critical,release,hotfix,in-progress'

          # ----------------------------------------------------------------
          # GENERAL SETTINGS
          # ----------------------------------------------------------------
          operations-per-run: 100
          remove-stale-when-updated: true
          debug-only: false
          ascending: false
