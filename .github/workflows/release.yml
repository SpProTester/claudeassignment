##############################################################################
# RELEASE PIPELINE — Job Portal Enterprise
# Triggered on every push to main (after PR merge).
# Runs semantic-release to automatically:
#   - Determine version bump from commits (MAJOR/MINOR/PATCH)
#   - Generate CHANGELOG.md
#   - Create GitHub Release with release notes
#   - Tag the release (e.g., v1.2.3)
#   - Update package.json version
##############################################################################

name: Release

on:
  push:
    branches:
      - main
      - next
      - beta
      - alpha

# Only one release at a time — prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9.1.0'

jobs:
  # ============================================================================
  # RELEASE — Automated semantic versioning and release notes
  # ============================================================================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Create tags and releases
      issues: write           # Comment on issues
      pull-requests: write    # Comment on PRs
      id-token: write         # For OIDC authentication (npm provenance)

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: 'github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
        run: pnpm release

  # ============================================================================
  # POST-RELEASE — Notify team and trigger deployment
  # ============================================================================
  notify:
    name: Notify on Release
    needs: release
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release-info
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1,
            });
            if (releases.data.length > 0) {
              const latest = releases.data[0];
              core.setOutput('tag', latest.tag_name);
              core.setOutput('url', latest.html_url);
              core.setOutput('name', latest.name);
            }

      - name: Log release details
        run: |
          echo "🎉 New release published!"
          echo "Version: ${{ steps.release-info.outputs.tag }}"
          echo "Release URL: ${{ steps.release-info.outputs.url }}"

      # Uncomment to add Slack notification:
      # - name: Notify Slack
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {
      #         "text": "🚀 Job Portal ${{ steps.release-info.outputs.tag }} released!\n${{ steps.release-info.outputs.url }}"
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
